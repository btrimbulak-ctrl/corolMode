name: Build Mod JAR

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build
        run: |
          cd colormod
          chmod +x gradlew
          ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: colormod-jar
          path: colormod/build/libs/colormod-*.jar
